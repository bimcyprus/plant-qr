<!DOCTYPE html>
<html lang="tr">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Yiyecek Bilgi Sayfasi</title>
	<style>
		:root {
			--bg-1: #f7f2e8;
			--bg-2: #efe6d4;
			--card: rgba(255, 255, 255, 0.82);
			--text: #2b2518;
			--muted: #6d6248;
			--accent: #0d6b57;
			--accent-dark: #084739;
			--outline: rgba(43, 37, 24, 0.14);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			min-height: 100vh;
			font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 15% 10%, rgba(255, 255, 255, 0.65) 0, rgba(255, 255, 255, 0) 48%),
				radial-gradient(circle at 90% 90%, rgba(13, 107, 87, 0.12) 0, rgba(13, 107, 87, 0) 45%),
				linear-gradient(135deg, var(--bg-1), var(--bg-2));
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.wrapper {
			width: min(520px, 100%);
			background: var(--card);
			border: 1px solid var(--outline);
			border-radius: 24px;
			backdrop-filter: blur(6px);
			box-shadow: 0 20px 40px rgba(43, 37, 24, 0.12);
			padding: 32px 24px;
			text-align: center;
			animation: rise 700ms ease-out;
		}

		.icon-box {
			width: 110px;
			height: 110px;
			border-radius: 24px;
			margin: 0 auto 20px;
			border: 1px solid var(--outline);
			background: #fff;
			display: grid;
			place-items: center;
			overflow: hidden;
		}

		.icon-box img {
			width: 76%;
			height: 76%;
			object-fit: contain;
		}

		h1 {
			font-size: clamp(1.3rem, 2vw + 1rem, 2rem);
			line-height: 1.2;
			margin-bottom: 10px;
			letter-spacing: 0.3px;
		}

		p {
			color: var(--muted);
			margin-bottom: 24px;
			line-height: 1.5;
		}

		.buttons {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 12px;
		}

		.pdf-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-height: 54px;
			border: none;
			border-radius: 14px;
			background: var(--accent);
			color: #fff;
			font-size: 1rem;
			font-weight: 700;
			text-decoration: none;
			transition: transform 180ms ease, background-color 180ms ease;
		}

		.pdf-btn:hover,
		.pdf-btn:focus-visible {
			background: var(--accent-dark);
			transform: translateY(-2px);
			outline: none;
		}

		.note {
			margin-top: 14px;
			font-size: 0.84rem;
			color: var(--muted);
		}

		@media (max-width: 520px) {
			.wrapper {
				padding: 28px 18px;
				border-radius: 20px;
			}

			.buttons {
				grid-template-columns: 1fr;
			}

			.pdf-btn {
				min-height: 50px;
			}
		}

		@keyframes rise {
			from {
				opacity: 0;
				transform: translateY(16px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
	</style>
</head>
<body>
	<main class="wrapper">
		<div class="icon-box">
			<img src="icon.png" alt="Yiyecek ikonu" />
		</div>

		<h1>Yiyecek Bilgisi</h1>
		<p>
			Lutfen dil seciniz. Sectiginiz dile ait PDF dosyasi yeni sekmede acilacaktir.
		</p>

		<section class="buttons" aria-label="Dil secenekleri">
			<a class="pdf-btn" href="yiyecek-tr.pdf" target="_blank" rel="noopener noreferrer">
				Turkce PDF
			</a>
			<a class="pdf-btn" href="food-en.pdf" target="_blank" rel="noopener noreferrer">
				English PDF
			</a>
		</section>

		<p class="note">www.limakhotels.com</p>
	</main>
</body>
</html>
